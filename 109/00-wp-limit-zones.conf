# WP protection zones for server 109 (RU-FastVDS) — no Cloudflare, direct IP
# Policy: 3 attempts per 30s allowed, then nginx cuts further requests (503)
# Actual 10-min IP ban handled by CrowdSec (crowdsecurity/http-wordpress-scan)
# Updated: v2026-03-28

# wp-login.php: max 6 req/min, burst=3 nodelay → ~3 quick attempts then throttle
limit_req_zone $binary_remote_addr zone=wp_login_global:20m rate=6r/m;

# xmlrpc.php: keep tight — 1 req/min
limit_req_zone $binary_remote_addr zone=wp_xmlrpc_global:20m rate=1r/m;
