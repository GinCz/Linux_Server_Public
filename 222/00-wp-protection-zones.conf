# wp-admin общий: 2 req/sec
limit_req_zone $wp_limit_key zone=wp_admin_222:20m rate=2r/s;

# xmlrpc: 1 req/min — почти полная блокировка
limit_req_zone $wp_limit_key zone=wp_xmlrpc_222:10m rate=1r/m;
