; configuration for php opcache module
; priority=10
; Version: v2026-04-12
; Server: 222-DE-NetCup — multi-site WordPress, 20+ pools, 8GB RAM
; = Rooted by VladiMIR | AI =

zend_extension=opcache.so

; Core
opcache.enable=1
opcache.enable_cli=0

; Memory — 256MB shared cache for all sites
opcache.memory_consumption=256
opcache.interned_strings_buffer=32
opcache.max_accelerated_files=20000

; Revalidation — check file changes every 60s (balance between perf and freshness)
opcache.revalidate_freq=60
opcache.validate_timestamps=1

; Stability
opcache.max_wasted_percentage=10
opcache.fast_shutdown=1
opcache.save_comments=1

; JIT — off (unstable with some WP plugins on PHP 8.3)
opcache.jit=off
opcache.jit_buffer_size=0
