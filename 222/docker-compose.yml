#
# IMPORTANT: templates and scripts are mounted as volumes
# so any file changes on host are immediately visible in container
# without docker cp or image rebuild!

version: '3.8'
services:
  crypto-bot:
    build: .
    container_name: crypto-bot
    restart: unless-stopped
    ports:
      - "127.0.0.1:5000:5000"
    environment:
      - TZ=Europe/Prague
    volumes:
      - ./config.json:/app/config.json
      - ./stats.json:/app/stats.json
      - ./logs:/app/logs
      - ./templates:/app/templates
      - ./scripts:/app/scripts
    mem_limit: 2g
    mem_reservation: 256m
    cpus: 1.0
