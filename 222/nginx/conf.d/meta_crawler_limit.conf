# Meta/Facebook crawler protection | v2026-04-05
# = Rooted by VladiMIR | AI =
# Problem: meta-externalagent simulates WooCommerce cart -> 151k req/h -> 46% CPU
# Solution: map UA -> key, use limit_req_zone (empty key = no limit for real users)
# Server: 222-DE-NetCup (Cloudflare proxy - no real IP, must use UA-based limiting)
# Deploy to: /etc/nginx/conf.d/meta_crawler_limit.conf

map $http_user_agent $meta_limit_key {
    default                   "";
    "~*meta-externalagent"    "meta";
    "~*facebookexternalhit"   "meta";
    "~*FacebookBot"           "meta";
}

# 2 req/s for Meta — enough for product scanning, not enough for cart flood
limit_req_zone $meta_limit_key zone=meta_global:10m rate=2r/s;
limit_req_status 429;
