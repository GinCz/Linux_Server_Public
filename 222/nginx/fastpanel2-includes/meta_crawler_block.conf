# Block Meta crawler from WooCommerce heavy endpoints | v2026-04-05
# = Rooted by VladiMIR | AI =
# Deploy to: /etc/nginx/fastpanel2-includes/meta_crawler_block.conf
# Included in ALL vhosts on 222 via fastpanel2-includes mechanism
#
# RESULT: CPU svetaform.eu dropped from ~46% to ~21% after applying

# Block Meta from cart, checkout, wp-admin, wp-cron — heaviest WooCommerce endpoints
location ~* ^/(basket|cart|checkout|wp-admin|wp-cron\.php) {
    if ($meta_limit_key = "meta") {
        return 403;
    }
    try_files $uri $uri/ /index.php?$args;
}

# Block Meta from WooCommerce AJAX
location ~* \?wc-ajax= {
    if ($meta_limit_key = "meta") {
        return 403;
    }
    try_files $uri $uri/ /index.php?$args;
}

# Rate limit Meta on all PHP requests (product pages — slow but allowed)
location ~ \.php$ {
    limit_req zone=meta_global burst=5 nodelay;
    include /etc/nginx/fastcgi_params;
    fastcgi_pass unix:/var/run/$server_name.sock;
    fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
    fastcgi_param DOCUMENT_ROOT $realpath_root;
}
