[eco-seo.cz]
user = gincz
group = gincz
listen = /var/run/eco-seo.cz.sock
listen.owner = gincz
listen.group = www-data
listen.mode = 0660

pm = ondemand
pm.max_children = 4
pm.min_spare_servers = 1
pm.max_spare_servers = 2
pm.max_requests = 1000

php_admin_value[date.timezone] = "Europe/Prague"
php_admin_value[display_errors] = "off"
php_admin_value[log_errors] = "On"
php_admin_value[mail.add_x_header] = "On"
php_admin_value[max_execution_time] = "120"
php_admin_value[max_input_vars] = "10000"
php_admin_value[opcache.blacklist_filename] = "/opt/opcache-blacklists/opcache-*.blacklist"
php_admin_value[opcache.max_accelerated_files] = "100000"
php_admin_value[output_buffering] = "4096"
php_admin_value[post_max_size] = "100M"
php_admin_value[sendmail_path] = "/usr/sbin/sendmail -t -i -f 'admin@eco-seo.cz'"
php_admin_value[session.save_path] = "/var/www/gincz/data/tmp"
php_admin_value[short_open_tag] = "On"
php_admin_value[upload_max_filesize] = "100M"
php_admin_value[upload_tmp_dir] = "/var/www/gincz/data/tmp"



env[SERVICE_HOST] = "127.0.0.1"

env[SERVICE_PORT] = "3144"


catch_workers_output = no
access.format = "%{REMOTE_ADDR}e - [%t] \"%m %r%Q%q %{SERVER_PROTOCOL}e\" %s %{kilo}M \"%{HTTP_REFERER}e\" \"%{HTTP_USER_AGENT}e\""
access.log = /var/www/gincz/data/logs/eco-seo.cz-backend.access.log
pm.process_idle_timeout = 10s
