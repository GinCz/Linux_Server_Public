name: default_ip_remediation
#debug: true
filters:
 - Alert.Remediation == true && Alert.GetScope() == "Ip"
decisions:
 - type: ban
   duration: 24h
duration_expr: Sprintf('%dh', (GetDecisionsCount(Alert.GetValue()) + 1) * 24)
# Escalation: 1st ban=24h, 2nd=48h, 3rd=72h ... capped by crowdsec at sane values
# duration_expr is top-level (NOT under decisions) - required by CrowdSec LAPI
# notifications:
#   - slack_default
#   - splunk_default
#   - http_default
#   - email_default
on_success: break
---
name: default_range_remediation
#debug: true
filters:
 - Alert.Remediation == true && Alert.GetScope() == "Range"
decisions:
 - type: ban
   duration: 24h
duration_expr: Sprintf('%dh', (GetDecisionsCount(Alert.GetValue()) + 1) * 24)
on_success: break
