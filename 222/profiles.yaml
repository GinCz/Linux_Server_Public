name: default_ip_remediation
#debug: true
filters:
 - Alert.Remediation == true && Alert.GetScope() == "Ip"
decisions:
 - type: ban
   # duration_expr escalation:
   # 1st offence  → 24h
   # 2nd offence  → 720h (30 days)
   # 3rd+ offence → 720h (30 days, capped)
   duration_expr: Sprintf('%dh', min((GetDecisionsCount(Alert.GetValue()) + 1) * 24, 720))
# notifications:
#   - slack_default
#   - splunk_default
#   - http_default
#   - email_default
on_success: break
---
name: default_range_remediation
#debug: true
filters:
 - Alert.Remediation == true && Alert.GetScope() == "Range"
decisions:
 - type: ban
   duration_expr: Sprintf('%dh', min((GetDecisionsCount(Alert.GetValue()) + 1) * 24, 720))
# notifications:
#   - slack_default
#   - splunk_default
#   - http_default
#   - email_default
on_success: break
