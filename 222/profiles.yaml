name: default_ip_remediation
#debug: true
filters:
 - Alert.Remediation == true && Alert.GetScope() == "Ip"
decisions:
 - type: ban
   duration: 24h
   duration_expr: Sprintf('%dh', 24 * (1 + GetDecisionsCount(Alert.GetValue())))
   # Escalation logic:
   # 1st offence (0 prev decisions) -> 24h
   # 2nd offence (1 prev decision)  -> 48h
   # 3rd offence (2 prev decisions) -> 72h
   # ... and so on up to 720h (30 days)
# notifications:
#   - slack_default
#   - splunk_default
#   - http_default
#   - email_default
on_success: break
