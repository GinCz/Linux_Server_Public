server {

    listen 152.53.182.222:443 quic reuseport;


    listen [2a0a:4cc0:c0:ef28:589d:cff:fea6:f0a1]:443 quic reuseport;

    server_name --;

    ssl_certificate /etc/nginx/ssl-certs/parking.crt;
