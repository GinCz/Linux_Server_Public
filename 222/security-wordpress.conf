# Global WordPress Security v2026-04-12
# Path on server: /etc/nginx/fastpanel2-includes/security-wordpress.conf
# Applied to: ALL sites via include /etc/nginx/fastpanel2-includes/*.conf
#
# NOTE: location = /xmlrpc.php is NOT here — it is added directly
# in each vhost .conf (fastpanel2-available/*/**.conf) to avoid duplicate location errors.
# Audit script: fix_missing_xmlrpc_v2026-04-12.sh

# Block WP REST API user enumeration
location ~* ^/wp-json/wp/v2/users {
    deny all;
    return 403;
}

# Block author enumeration
if ($query_string ~* "author=[0-9]") {
    return 403;
}

# Block sensitive WP files
location ~* ^/(wp-config\.php|wp-config-sample\.php|readme\.html|license\.txt) {
    deny all;
    return 403;
}
