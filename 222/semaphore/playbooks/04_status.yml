---
# Playbook 4: Server status report
# Version: v2026-03-29
# = Rooted by VladiMIR | AI =

- name: Server status report
  hosts: all_servers
  gather_facts: true

  tasks:
    - name: Get disk usage
      ansible.builtin.shell: df -h / | tail -1 | awk '{print $3"/"$2" ("$5" used)"}'
      register: disk_usage

    - name: Get RAM usage
      ansible.builtin.shell: free -m | awk '/Mem:/ {printf "%dMB / %dMB (%.0f%% used)", $3, $2, $3/$2*100}'
      register: ram_usage

    - name: Get uptime
      ansible.builtin.shell: uptime -p
      register: uptime_info

    - name: Get running services
      ansible.builtin.shell: |
        services=""
        systemctl is-active docker &>/dev/null && services="$services Docker"
        systemctl is-active nginx &>/dev/null && services="$services Nginx"
        systemctl is-active crowdsec &>/dev/null && services="$services CrowdSec"
        systemctl is-active clamav-daemon &>/dev/null && services="$services ClamAV"
        echo $services
      register: services_info
      ignore_errors: true

    - name: Get docker containers detail
      ansible.builtin.shell: |
        export PATH=$PATH:/usr/bin:/usr/local/bin

        declare -A DESC
        DESC[semaphore]="Ansible UI — управление серверами через браузер"
        DESC[crypto-bot]="Telegram крипто-бот — приём платежей"
        DESC[amnezia-awg]="AmneziaWG VPN — защищённый туннель для клиентов"
        DESC[uptime-kuma]="Uptime Kuma — мониторинг доступности сайтов"

        if [ ! -x /usr/bin/docker ] && [ ! -x /usr/local/bin/docker ]; then
          echo "Docker не установлен"
          exit 0
        fi

        DOCKER=/usr/bin/docker
        [ -x /usr/local/bin/docker ] && DOCKER=/usr/local/bin/docker

        CONTAINERS=$($DOCKER ps -a --format '{% raw %}{{.Names}}{% endraw %}' 2>/dev/null)
        if [ -z "$CONTAINERS" ]; then
          echo "Нет контейнеров"
          exit 0
        fi

        while IFS= read -r NAME; do
          IMAGE=$($DOCKER inspect --format '{% raw %}{{.Config.Image}}{% endraw %}' "$NAME" 2>/dev/null)
          STATUS=$($DOCKER inspect --format '{% raw %}{{.State.Status}}{% endraw %}' "$NAME" 2>/dev/null)
          SIZE=$($DOCKER image inspect "$IMAGE" --format '{% raw %}{{.Size}}{% endraw %}' 2>/dev/null | awk '{printf "%.0f MB", $1/1024/1024}')
          PORTS=$($DOCKER port "$NAME" 2>/dev/null | tr '\n' ' ' | sed 's/  */ /g')
          DESCR="${DESC[$NAME]:-Описание не задано}"
          echo "---"
          echo "  Контейнер : $NAME [$STATUS]"
          echo "  Описание  : $DESCR"
          echo "  Образ     : $IMAGE"
          echo "  Размер    : ${SIZE:-н/д}"
          [ -n "$PORTS" ] && echo "  Порты     : $PORTS"
        done <<< "$CONTAINERS"
      register: docker_info
      ignore_errors: true

    - name: Print server report
      ansible.builtin.debug:
        msg:
          - "======================================"
          - "Server  : {{ inventory_hostname }}"
          - "IP      : {{ ansible_host }}"
          - "OS      : {{ ansible_distribution }} {{ ansible_distribution_version }}"
          - "Uptime  : {{ uptime_info.stdout }}"
          - "RAM     : {{ ram_usage.stdout }}"
          - "Disk /  : {{ disk_usage.stdout }}"
          - "Services: {{ services_info.stdout | default('n/a') }}"
          - "--- Docker ---"
          - "{{ docker_info.stdout | default('Docker недоступен') }}"
          - "======================================"
