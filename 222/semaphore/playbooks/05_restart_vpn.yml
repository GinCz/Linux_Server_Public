---
# Playbook 5: Restart amnezia-awg on all VPN servers
# Version: v2026-03-29
# = Rooted by VladiMIR | AI =

- name: Restart amnezia-awg VPN
  hosts: vpn_servers
  gather_facts: false

  tasks:
    - name: Restart amnezia-awg container
      ansible.builtin.shell: |
        DOCKER=""
        [ -x /usr/bin/docker ]       && DOCKER=/usr/bin/docker
        [ -x /usr/local/bin/docker ] && DOCKER=/usr/local/bin/docker
        if [ -z "$DOCKER" ]; then
          echo "Docker не установлен"
          exit 1
        fi
        $DOCKER restart amnezia-awg
      args:
        executable: /bin/bash
      register: restart_result

    - name: Check container status after restart
      ansible.builtin.shell: |
        DOCKER=""
        [ -x /usr/bin/docker ]       && DOCKER=/usr/bin/docker
        [ -x /usr/local/bin/docker ] && DOCKER=/usr/local/bin/docker
        $DOCKER inspect --format '{% raw %}{{.State.Status}}{% endraw %}' amnezia-awg 2>/dev/null
      args:
        executable: /bin/bash
      register: status_result

    - name: Show result
      ansible.builtin.debug:
        msg: "{{ inventory_hostname }} ({{ ansible_host }}) — amnezia-awg: {{ status_result.stdout }}"
