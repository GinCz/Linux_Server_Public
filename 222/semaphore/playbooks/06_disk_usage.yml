---
# Playbook 6: Disk usage on all servers
# Version: v2026-03-29
# = Rooted by VladiMIR | AI =

- name: Disk usage report
  hosts: all_servers
  gather_facts: false

  tasks:
    - name: Get disk usage
      ansible.builtin.shell: >
        df -h / | tail -1 | awk '{print $2" total, "$3" used, "$4" free ("$5" used)"}'
      args:
        executable: /bin/bash
      register: disk_result

    - name: Show disk usage
      ansible.builtin.debug:
        msg: "{{ inventory_hostname }} ({{ ansible_host }}) — Disk: {{ disk_result.stdout }}"
