# =============================================================
# sem.gincz.com-fastpanel.conf
# Nginx include for FASTPANEL - Semaphore WebSocket proxy
# Path: /etc/nginx/fastpanel2-sites/gincz/sem.gincz.com.includes
#   OR: add as custom include in FASTPANEL site settings
# Version: v2026-03-27
# = Rooted by VladiMIR | AI =
# =============================================================
#
# FASTPANEL already generates the main server{} block.
# This file adds WebSocket support for Semaphore task logs.
# Place in: /etc/nginx/fastpanel2-sites/gincz/sem.gincz.com.includes
# (the main config already has: include "/etc/nginx/fastpanel2-sites/gincz/sem.gincz.com.includes";)

# WebSocket upgrade support for Semaphore real-time logs
proxy_http_version 1.1;
proxy_set_header Upgrade $http_upgrade;
proxy_set_header Connection "upgrade";

# Proper headers for reverse proxy
proxy_set_header Host               $host;
proxy_set_header X-Real-IP          $remote_addr;
proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
proxy_set_header X-Forwarded-Proto  $scheme;
proxy_set_header X-Forwarded-Port   $server_port;

# Timeouts (Ansible tasks can run long)
proxy_read_timeout    300;
proxy_connect_timeout  60;
proxy_send_timeout    300;

# Buffer settings
proxy_buffering off;
