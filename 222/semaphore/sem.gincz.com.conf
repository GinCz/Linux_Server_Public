# sem.gincz.com.conf — Nginx reverse proxy for Semaphore
# Version: v2026-03-27
# Path: /etc/nginx/sites-available/sem.gincz.com.conf (or FASTPANEL vhost include)
# = Rooted by VladiMIR | AI =

server {
    server_name sem.gincz.com;
    listen xxx.xxx.xxx.222:443 ssl;

    ssl_certificate     /etc/letsencrypt/live/sem.gincz.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sem.gincz.com/privkey.pem;
    include /etc/nginx/fastpanel2-includes/letsencrypt.conf;
    include /usr/local/fastpanel2-nginx/settings/limits.conf;

    # --- Security headers ---
    add_header X-Frame-Options        "SAMEORIGIN"  always;
    add_header X-Content-Type-Options "nosniff"     always;
    add_header X-XSS-Protection       "1; mode=block" always;

    # --- Proxy to Semaphore container ---
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_redirect     off;

        proxy_set_header Host               $host;
        proxy_set_header X-Real-IP          $remote_addr;
        proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto  $scheme;
        proxy_set_header X-Forwarded-Port   $server_port;

        # WebSocket support (needed for terminal/task logs)
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_read_timeout 300;
        proxy_connect_timeout 60;
        proxy_send_timeout 300;
    }

    access_log /var/log/nginx/sem.gincz.com.access.log;
    error_log  /var/log/nginx/sem.gincz.com.error.log;
}

server {
    server_name sem.gincz.com;
    listen xxx.xxx.xxx.222:80;
    include /etc/nginx/fastpanel2-includes/letsencrypt.conf;
    location / {
        return 301 https://$host$request_uri;
    }
    error_log /dev/null crit;
    access_log off;
}
