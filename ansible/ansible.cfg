[defaults]
# Suppress Python interpreter warnings
interpreter_python = auto_silent

# Clean output
nocows = 1
display_skipped_hosts = false

# Hide PLAY RECAP and task headers - only show debug msg output
stdout_callback = debug

[ssh_connection]
pipelining = true
