[defaults]
# Suppress Python interpreter warnings
interpreter_python = auto_silent

# Clean output - no cowsay
nocows = 1

# Do not show skipped hosts in recap
display_skipped_hosts = false

# Faster SSH
[ssh_connection]
pipelining = true
