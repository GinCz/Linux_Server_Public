---
# cleanup_vpn.yml - Safe cleanup for VPN nodes
# Cleans: apt cache, old kernels, logs, temp files, journal
# Protects: AmneziaWG, Samba, Docker containers (Kuma, Prometheus, AdGuard)
# Version: v2026-03-27
# = Rooted by VladiMIR | AI =

- name: Safe cleanup VPN servers
  hosts: servers_vpn
  gather_facts: true

  tasks:

    # ── 1. BEFORE ────────────────────────────────────────────────
    - name: Show disk BEFORE cleanup
      ansible.builtin.shell: "df -h / | tail -1 | awk '{print \"BEFORE: \" $3 \" used / \" $2 \" total (\" $5 \")\"}'"
      register: disk_before
      changed_when: false

    - name: Print disk before
      ansible.builtin.debug:
        msg: "{{ inventory_hostname }} | {{ disk_before.stdout }}"

    # ── 2. CHECK CRITICAL SERVICES ───────────────────────────────
    - name: Check AmneziaWG is running
      ansible.builtin.shell: >
        systemctl is-active awg-quick@* 2>/dev/null ||
        wg show 2>/dev/null | grep -c interface ||
        echo 'not_found'
      register: awg_status
      changed_when: false
      ignore_errors: true

    - name: Check Samba is running
      ansible.builtin.shell: "systemctl is-active smbd 2>/dev/null || echo 'not_found'"
      register: samba_status
      changed_when: false
      ignore_errors: true

    - name: Check Docker containers
      ansible.builtin.shell: "docker ps --format '{% raw %}{{.Names}}:{{.Status}}{% endraw %}' 2>/dev/null || echo 'docker_not_running'"
      register: docker_before
      changed_when: false
      ignore_errors: true

    - name: Show services status before
      ansible.builtin.debug:
        msg:
          - "{{ inventory_hostname }} | AmneziaWG: {{ awg_status.stdout }}"
          - "{{ inventory_hostname }} | Samba: {{ samba_status.stdout }}"
          - "{{ inventory_hostname }} | Docker: {{ docker_before.stdout_lines }}"

    # ── 3. APT CLEANUP ───────────────────────────────────────────
    - name: apt autoremove old packages
      ansible.builtin.apt:
        autoremove: true
        purge: true
      ignore_errors: true

    - name: apt autoclean cache
      ansible.builtin.apt:
        autoclean: true
      ignore_errors: true

    - name: Clean apt cache
      ansible.builtin.shell: apt-get clean
      changed_when: false
      ignore_errors: true

    # ── 4. JOURNAL LOGS ──────────────────────────────────────────
    - name: Vacuum journal logs (keep 100MB)
      ansible.builtin.shell: journalctl --vacuum-size=100M
      changed_when: false
      ignore_errors: true

    - name: Vacuum journal by time (keep 7 days)
      ansible.builtin.shell: journalctl --vacuum-time=7d
      changed_when: false
      ignore_errors: true

    # ── 5. TEMP FILES ────────────────────────────────────────────
    - name: Clean /tmp older than 7 days
      ansible.builtin.shell: "find /tmp -type f -atime +7 -delete 2>/dev/null || true"
      changed_when: false
      ignore_errors: true

    - name: Clean /var/tmp older than 14 days
      ansible.builtin.shell: "find /var/tmp -type f -atime +14 -delete 2>/dev/null || true"
      changed_when: false
      ignore_errors: true

    # ── 6. OLD LOGS ──────────────────────────────────────────────
    - name: Rotate and compress old logs
      ansible.builtin.shell: "logrotate -f /etc/logrotate.conf 2>/dev/null || true"
      changed_when: false
      ignore_errors: true

    - name: Remove old .gz log files older than 30 days
      ansible.builtin.shell: "find /var/log -name '*.gz' -mtime +30 -delete 2>/dev/null || true"
      changed_when: false
      ignore_errors: true

    - name: Remove rotated logs older than 14 days
      ansible.builtin.shell: "find /var/log \\( -name '*.1' -o -name '*.2' -o -name '*.3' \\) -delete 2>/dev/null || true"
      changed_when: false
      ignore_errors: true

    # ── 7. DOCKER CLEANUP (safe — only unused images) ────────────
    - name: Check if Docker is installed
      ansible.builtin.shell: "which docker && docker info > /dev/null 2>&1 && echo 'yes' || echo 'no'"
      register: docker_installed
      changed_when: false
      ignore_errors: true

    - name: Docker prune unused images (NOT running containers)
      ansible.builtin.shell: "docker image prune -f 2>/dev/null || true"
      when: "'yes' in docker_installed.stdout"
      changed_when: false
      ignore_errors: true

    - name: Docker prune build cache
      ansible.builtin.shell: "docker builder prune -f 2>/dev/null || true"
      when: "'yes' in docker_installed.stdout"
      changed_when: false
      ignore_errors: true

    # ── 8. VERIFY SERVICES STILL RUNNING ────────────────────────
    - name: Verify AmneziaWG still active
      ansible.builtin.shell: >
        systemctl is-active awg-quick@* 2>/dev/null ||
        wg show 2>/dev/null | grep -c interface ||
        echo 'not_found'
      register: awg_after
      changed_when: false
      ignore_errors: true

    - name: Verify Samba still active
      ansible.builtin.shell: "systemctl is-active smbd 2>/dev/null || echo 'not_found'"
      register: samba_after
      changed_when: false
      ignore_errors: true

    - name: Verify Docker containers still running
      ansible.builtin.shell: "docker ps --format '{% raw %}{{.Names}}:{{.Status}}{% endraw %}' 2>/dev/null || echo 'docker_not_running'"
      register: docker_after
      changed_when: false
      ignore_errors: true

    # ── 9. AFTER ─────────────────────────────────────────────────
    - name: Show disk AFTER cleanup
      ansible.builtin.shell: "df -h / | tail -1 | awk '{print \"AFTER:  \" $3 \" used / \" $2 \" total (\" $5 \")\"}'"
      register: disk_after
      changed_when: false

    - name: Final report
      ansible.builtin.debug:
        msg:
          - "========================================"
          - "{{ inventory_hostname }} CLEANUP REPORT"
          - "{{ disk_before.stdout }}"
          - "{{ disk_after.stdout }}"
          - "AmneziaWG before/after: {{ awg_status.stdout }} / {{ awg_after.stdout }}"
          - "Samba before/after:     {{ samba_status.stdout }} / {{ samba_after.stdout }}"
          - "Docker after: {{ docker_after.stdout_lines }}"
          - "========================================"
