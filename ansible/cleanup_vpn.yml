---
# cleanup_vpn.yml - Safe cleanup for VPN nodes
# Cleans: apt cache, old kernels, logs, temp files, journal
# Protects: AmneziaWG, Samba, Docker containers (Kuma, Prometheus, AdGuard)
# Version: v2026-03-27
# = Rooted by VladiMIR | AI =

- name: Safe cleanup VPN servers
  hosts: servers_vpn
  gather_facts: true

  tasks:

    # ── 1. DISK BEFORE ────────────────────────────────────────
    - name: Disk usage before
      ansible.builtin.shell: "df / | tail -1 | awk '{print $3, $2, $5}'"
      register: disk_before_raw
      changed_when: false

    - name: Parse disk before
      ansible.builtin.set_fact:
        kb_used_before: "{{ disk_before_raw.stdout.split()[0] | int }}"
        pct_before: "{{ disk_before_raw.stdout.split()[2] }}"

    # ── 2. CHECK SERVICES BEFORE ───────────────────────────
    - name: Check AmneziaWG
      ansible.builtin.shell: "docker ps --filter name=amnezia --format 'running' 2>/dev/null | head -1 || echo 'stopped'"
      register: awg_status
      changed_when: false
      ignore_errors: true

    - name: Check Samba (first word only)
      ansible.builtin.shell: "systemctl is-active smbd 2>/dev/null | head -1 | awk '{print $1}' || echo 'n/a'"
      register: samba_status
      changed_when: false
      ignore_errors: true

    # ── 3. APT CLEANUP ────────────────────────────────────────
    - name: apt autoremove
      ansible.builtin.apt:
        autoremove: true
        purge: true
      ignore_errors: true

    - name: apt autoclean
      ansible.builtin.apt:
        autoclean: true
      ignore_errors: true

    - name: apt-get clean
      ansible.builtin.shell: apt-get clean
      changed_when: false
      ignore_errors: true

    # ── 4. JOURNAL ─────────────────────────────────────────────
    - name: Journal vacuum 100MB / 7d
      ansible.builtin.shell: "journalctl --vacuum-size=100M && journalctl --vacuum-time=7d"
      changed_when: false
      ignore_errors: true

    # ── 5. TEMP & LOGS ───────────────────────────────────────
    - name: Clean tmp and old logs
      ansible.builtin.shell: |
        find /tmp -type f -atime +7 -delete 2>/dev/null || true
        find /var/tmp -type f -atime +14 -delete 2>/dev/null || true
        logrotate -f /etc/logrotate.conf 2>/dev/null || true
        find /var/log -name '*.gz' -mtime +30 -delete 2>/dev/null || true
        find /var/log \( -name '*.1' -o -name '*.2' -o -name '*.3' \) -delete 2>/dev/null || true
      changed_when: false
      ignore_errors: true

    # ── 6. DOCKER CLEANUP ────────────────────────────────────
    - name: Check Docker available
      ansible.builtin.shell: "which docker && docker info > /dev/null 2>&1 && echo 'yes' || echo 'no'"
      register: docker_installed
      changed_when: false
      ignore_errors: true

    - name: Docker prune unused images + build cache
      ansible.builtin.shell: "docker image prune -f && docker builder prune -f 2>/dev/null || true"
      when: "'yes' in docker_installed.stdout"
      changed_when: false
      ignore_errors: true

    # ── 7. DISK AFTER ─────────────────────────────────────────
    - name: Disk usage after
      ansible.builtin.shell: "df / | tail -1 | awk '{print $3, $5}'"
      register: disk_after_raw
      changed_when: false

    - name: Parse disk after + calc freed
      ansible.builtin.set_fact:
        kb_used_after: "{{ disk_after_raw.stdout.split()[0] | int }}"
        pct_after: "{{ disk_after_raw.stdout.split()[1] }}"
        gb_before: "{{ (kb_used_before | int / 1048576) | round(1) }}"
        gb_after: "{{ (disk_after_raw.stdout.split()[0] | int / 1048576) | round(1) }}"
        mb_freed: "{{ ((kb_used_before | int - disk_after_raw.stdout.split()[0] | int) / 1024) | round(0, 'floor') | int }}"

    # ── 8. VERIFY SERVICES AFTER ────────────────────────────
    - name: Verify AmneziaWG after
      ansible.builtin.shell: "docker ps --filter name=amnezia --format 'running' 2>/dev/null | head -1 || echo 'stopped'"
      register: awg_after
      changed_when: false
      ignore_errors: true

    - name: Verify Samba after (first word only)
      ansible.builtin.shell: "systemctl is-active smbd 2>/dev/null | head -1 | awk '{print $1}' || echo 'n/a'"
      register: samba_after
      changed_when: false
      ignore_errors: true

    # ── 9. FINAL REPORT TABLE ───────────────────────────────
    - name: "=== CLEANUP REPORT ==="
      ansible.builtin.debug:
        msg:
          - "+------------------+--------+------+--------+------+---------+----------+----------+"
          - "| Server           | Before | %    | After  | %    | Freed   | AWG      | Samba    |"
          - "+------------------+--------+------+--------+------+---------+----------+----------+"
          - "| {{ '%-16s' | format(inventory_hostname) }} | {{ '%5sG' | format(gb_before) }} | {{ '%4s' | format(pct_before) }} | {{ '%5sG' | format(gb_after) }} | {{ '%4s' | format(pct_after) }} | {{ '%5s MB' | format(mb_freed) }} | {{ '%-8s' | format(awg_after.stdout | trim | truncate(8, true, '')) }} | {{ '%-8s' | format(samba_after.stdout | trim | truncate(8, true, '')) }} |"
          - "+------------------+--------+------+--------+------+---------+----------+----------+"
