---
# set_timezone.yml - Set Europe/Prague timezone on all servers
# Ensures 24h display (Ubuntu default)
# Version: v2026-03-27
# = Rooted by VladiMIR | AI =

- name: Set timezone Europe/Prague on all servers
  hosts: all
  gather_facts: false

  tasks:

    - name: Set timezone to Europe/Prague
      community.general.timezone:
        name: Europe/Prague
      ignore_errors: true

    # Fallback if community.general not available
    - name: Set timezone via timedatectl (fallback)
      ansible.builtin.shell: timedatectl set-timezone Europe/Prague
      changed_when: false
      ignore_errors: true

    - name: Verify timezone
      ansible.builtin.shell: "timedatectl | grep 'Time zone' | awk '{print $3, $4, $5}'"
      register: tz_result
      changed_when: false

    - name: Show current time on server
      ansible.builtin.shell: "date '+%Y-%m-%d %H:%M:%S %Z'"
      register: time_result
      changed_when: false

    - name: Timezone report
      ansible.builtin.debug:
        msg: "{{ inventory_hostname }} | TZ: {{ tz_result.stdout }} | Time: {{ time_result.stdout }}"
