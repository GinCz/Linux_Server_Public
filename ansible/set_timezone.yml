---
# set_timezone.yml - Set Europe/Prague timezone on all servers
# Version: v2026-03-27
# = Rooted by VladiMIR | AI =

- name: Set timezone Europe/Prague on all servers
  hosts: all
  gather_facts: false

  tasks:

    - name: Set timezone to Europe/Prague
      community.general.timezone:
        name: Europe/Prague
      ignore_errors: true

    - name: Set timezone via timedatectl (fallback)
      ansible.builtin.shell: timedatectl set-timezone Europe/Prague
      changed_when: false
      ignore_errors: true

    - name: Get current time 24h format
      ansible.builtin.shell: "date '+%d.%m.%Y %H:%M:%S'"
      register: time_result
      changed_when: false

    - name: Get timezone name
      ansible.builtin.shell: "timedatectl show --property=Timezone --value"
      register: tz_result
      changed_when: false

    - name: "=== TIMEZONE REPORT ==="
      ansible.builtin.debug:
        msg: "{{ '%-16s' | format(inventory_hostname) }} | {{ tz_result.stdout | trim }} | {{ time_result.stdout | trim }}"
