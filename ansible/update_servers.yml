---
# update_servers.yml - apt update + upgrade on all servers
# Version: v2026-03-27
# = Rooted by VladiMIR | AI =

- name: Update all servers
  hosts: all
  gather_facts: false

  tasks:
    - name: apt update cache
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600

    - name: apt upgrade all packages
      ansible.builtin.apt:
        upgrade: dist
        autoremove: true
        autoclean: true
      register: upgrade_result

    - name: Show upgrade result
      ansible.builtin.debug:
        msg: "{{ inventory_hostname }} | upgraded: {{ upgrade_result.changed }}"

    - name: Check if reboot required
      ansible.builtin.stat:
        path: /var/run/reboot-required
      register: reboot_required

    - name: Notify if reboot needed
      ansible.builtin.debug:
        msg: "⚠️ {{ inventory_hostname }} REQUIRES REBOOT!"
      when: reboot_required.stat.exists
